<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ATXP Key Manager</title>
<style>
  :root { --bg:#0b0f14; --card:#141b23; --fg:#e7edf3; --mut:#8a97a6; --acc:#4ea1ff; --bad:#ff5c6c; --ok:#36d399; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font: 15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header { padding:18px 16px; border-bottom:1px solid #1f2a36; display:flex; justify-content:space-between; align-items:center; }
  h1 { font-size:17px; margin:0; }
  main { padding:16px; max-width:720px; margin:0 auto; }
  .card { background:var(--card); border:1px solid #1f2a36; border-radius:14px; padding:16px; margin-bottom:14px; }
  label { display:block; font-size:12px; color:var(--mut); margin-bottom:6px; }
  input, button, textarea { font:inherit; width:100%; padding:12px 14px; border-radius:10px; border:1px solid #273443; background:#0f151c; color:var(--fg); }
  button { background:var(--acc); color:#001328; border:0; font-weight:600; margin-top:10px; cursor:pointer; }
  button.secondary { background:#273443; color:var(--fg); }
  button.danger { background:var(--bad); color:#1b0307; }
  .row { display:flex; gap:8px; }
  .row > * { flex:1; }
  .key { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #1f2a36; gap:10px; }
  .key:last-child { border:0; }
  .kinfo { min-width:0; }
  .klabel { font-weight:600; }
  .kmeta { font-size:12px; color:var(--mut); word-break:break-all; }
  .pill { font-size:11px; padding:3px 8px; border-radius:999px; display:inline-block; }
  .pill.on { background:#0e3a2b; color:var(--ok); }
  .pill.off { background:#3a0e14; color:var(--bad); }
  .actions { display:flex; gap:6px; }
  .actions button { padding:8px 10px; margin:0; font-size:12px; width:auto; }
  .err { color:var(--bad); font-size:13px; margin-top:8px; }
  .muted { color:var(--mut); font-size:12px; }
  .tabs { display:flex; gap:6px; margin-bottom:12px; }
  .tabs button { flex:1; background:#1f2a36; color:var(--fg); padding:10px; font-weight:500; margin:0; }
  .tabs button.active { background:var(--acc); color:#001328; }
  .hidden { display:none; }
</style>
</head>
<body>

<header>
  <h1>🔑 ATXP Keys</h1>
  <button id="logoutBtn" class="secondary hidden" style="width:auto;padding:6px 12px;margin:0;font-size:12px;">Logout</button>
</header>

<main>

<section id="loginView" class="card">
  <label>Worker URL</label>
  <input id="workerUrl" placeholder="https://atxp-proxy.yourname.workers.dev" autocomplete="url" />
  <label style="margin-top:10px">Password</label>
  <input id="password" type="password" placeholder="dashboard password" autocomplete="current-password" />
  <button id="loginBtn">Sign in</button>
  <div id="loginErr" class="err"></div>
  <p class="muted" style="margin-top:10px">Password is the <code>DASHBOARD_PASSWORD</code> secret you set on the Worker.</p>
</section>

<section id="appView" class="hidden">

  <div class="tabs">
    <button data-tab="keys" class="active">Keys</button>
    <button data-tab="test">Test call</button>
  </div>

  <div id="tab-keys">
    <div class="card">
      <label>Add new ATXP API key</label>
      <input id="newLabel" placeholder="label (e.g. key-1)" />
      <input id="newKey" placeholder="atxp_..." style="margin-top:8px" />
      <button id="addBtn">Add key</button>
      <div id="addErr" class="err"></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <strong>Pool</strong>
        <button id="refreshBtn" class="secondary" style="width:auto;padding:6px 12px;margin:0;font-size:12px;">Refresh</button>
      </div>
      <div id="keyList"><p class="muted">loading…</p></div>
    </div>
  </div>

  <div id="tab-test" class="hidden">
    <div class="card">
      <label>Test call — path</label>
      <input id="testPath" value="/v1/models" />
      <label style="margin-top:8px">Method</label>
      <input id="testMethod" value="GET" />
      <label style="margin-top:8px">Body (JSON, optional)</label>
      <textarea id="testBody" rows="4" placeholder='{"prompt":"hi"}'></textarea>
      <button id="testBtn">Send</button>
      <pre id="testOut" class="muted" style="white-space:pre-wrap;margin-top:10px;max-height:300px;overflow:auto;"></pre>
    </div>
    <p class="muted">The Worker picks an active key, forwards your request to <code>api.atxp.ai</code>, and auto-rotates if that key is dead (401/402).</p>
  </div>

</section>

</main>

<script>
const $ = id => document.getElementById(id);
const LS = { url: "atxp_worker_url", pw: "atxp_pw" };

function show(view) {
  $("loginView").classList.toggle("hidden", view !== "login");
  $("appView").classList.toggle("hidden", view !== "app");
  $("logoutBtn").classList.toggle("hidden", view !== "app");
}

function cfg() {
  return { url: localStorage.getItem(LS.url), pw: localStorage.getItem(LS.pw) };
}

async function api(path, opts = {}) {
  const { url, pw } = cfg();
  const r = await fetch(url.replace(/\/$/, "") + path, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + pw,
      ...(opts.headers || {}),
    },
  });
  return r;
}

$("loginBtn").onclick = async () => {
  const url = $("workerUrl").value.trim();
  const pw = $("password").value;
  $("loginErr").textContent = "";
  if (!url || !pw) { $("loginErr").textContent = "both fields required"; return; }
  localStorage.setItem(LS.url, url);
  localStorage.setItem(LS.pw, pw);
  const r = await api("/admin/keys");
  if (r.status === 401) { $("loginErr").textContent = "wrong password"; return; }
  if (!r.ok) { $("loginErr").textContent = "error " + r.status + " - check Worker URL"; return; }
  show("app");
  loadKeys();
};

$("logoutBtn").onclick = () => {
  localStorage.removeItem(LS.pw);
  show("login");
};

document.querySelectorAll(".tabs button").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
    $("tab-keys").classList.toggle("hidden", b.dataset.tab !== "keys");
    $("tab-test").classList.toggle("hidden", b.dataset.tab !== "test");
  };
});

async function loadKeys() {
  $("keyList").innerHTML = '<p class="muted">loading…</p>';
  const r = await api("/admin/keys");
  if (!r.ok) { $("keyList").innerHTML = '<p class="err">error '+r.status+'</p>'; return; }
  const keys = await r.json();
  if (!keys.length) { $("keyList").innerHTML = '<p class="muted">no keys yet — add one above</p>'; return; }
  $("keyList").innerHTML = keys.map(k => `
    <div class="key">
      <div class="kinfo">
        <div class="klabel">${escapeHtml(k.label||"(no label)")} <span class="pill ${k.active?'on':'off'}">${k.active?'active':'dead'}</span></div>
        <div class="kmeta">${k.preview} · last used: ${k.last_used?new Date(k.last_used).toLocaleString():'never'}</div>
      </div>
      <div class="actions">
        <button class="secondary" onclick="toggleKey(${k.id}, ${k.active?0:1})">${k.active?'disable':'enable'}</button>
        <button class="danger" onclick="delKey(${k.id})">delete</button>
      </div>
    </div>`).join("");
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

window.toggleKey = async (id, active) => {
  await api(`/admin/keys/${id}/toggle`, { method: "POST", body: JSON.stringify({ active: !!active }) });
  loadKeys();
};
window.delKey = async id => {
  if (!confirm("delete this key?")) return;
  await api(`/admin/keys/${id}`, { method: "DELETE" });
  loadKeys();
};

$("addBtn").onclick = async () => {
  $("addErr").textContent = "";
  const label = $("newLabel").value.trim();
  const api_key = $("newKey").value.trim();
  if (!api_key) { $("addErr").textContent = "api_key required"; return; }
  const r = await api("/admin/keys", { method: "POST", body: JSON.stringify({ label, api_key }) });
  if (!r.ok) { $("addErr").textContent = "error " + r.status; return; }
  $("newLabel").value = ""; $("newKey").value = "";
  loadKeys();
};

$("refreshBtn").onclick = loadKeys;

$("testBtn").onclick = async () => {
  const path = $("testPath").value.trim();
  const method = $("testMethod").value.trim().toUpperCase();
  const body = $("testBody").value.trim();
  $("testOut").textContent = "sending…";
  try {
    const r = await api(path, { method, body: (method==="GET"||!body)?undefined:body });
    const txt = await r.text();
    $("testOut").textContent = "HTTP " + r.status + "\n\n" + txt;
  } catch (e) {
    $("testOut").textContent = "error: " + e.message;
  }
};

(async function init(){
  const { url, pw } = cfg();
  if (url && pw) {
    $("workerUrl").value = url;
    const r = await api("/admin/keys");
    if (r.ok) { show("app"); loadKeys(); return; }
  }
  if (url) $("workerUrl").value = url;
  show("login");
})();
</script>
</body>
</html>
